<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intentionality Calendar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff;
            margin: 0;
            padding: 20px 24px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            box-sizing: border-box;
        }
        
        /* Header */
        .header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; }
        .nav-btn { background: none; border: none; cursor: pointer; font-size: 14px; color: #999; padding: 0 2px; }
        .nav-btn:hover { color: #333; }
        .month-title { font-size: 18px; font-weight: 500; color: #111; letter-spacing: -0.3px; }
        .year-title { font-size: 14px; color: #999; }
        .today-btn { font-size: 11px; margin-left: 6px; }
        .logged-count { margin-left: auto; font-size: 11px; color: #bbb; }

        /* Legend & Stats */
        .legend { display: flex; gap: 14px; margin-bottom: 8px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #999; }
        .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        
        .stats-bar { display: flex; height: 3px; border-radius: 2px; overflow: hidden; margin-bottom: 14px; background: #f0f0f0; }
        .stats-segment { height: 100%; transition: width 0.3s ease; }

        /* Grid */
        .dow-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 3px; }
        .dow-item { font-size: 10px; color: #bbb; text-align: center; padding: 2px 0; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
        .day-cell {
            min-height: 108px; background: #fafafa; border: 1px solid #ebebeb; border-radius: 3px;
            padding: 5px 6px; cursor: pointer; box-sizing: border-box; overflow: hidden;
            display: flex; flex-direction: column; gap: 3px; transition: background 0.1s;
        }
        .day-cell:hover { background: #f5f5f5; }
        .day-cell.is-today { background: #f8f8f8; border-color: #ccc; }
        .day-cell.is-today:hover { background: #f2f2f2; }
        .day-cell.is-future { opacity: 0.38; }
        
        .day-header { display: flex; align-items: center; gap: 4px; }
        .day-number { font-size: 9px; color: #bbb; line-height: 1; min-width: 12px; }
        .day-preview { font-size: 10.5px; color: #444; line-height: 1.45; word-break: break-word; overflow: hidden; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.82);
            align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content {
            background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 20px 22px;
            width: 420px; max-width: 92vw; box-sizing: border-box; max-height: 90vh; overflow-y: auto;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .modal-title { font-size: 13px; font-weight: 500; color: #222; }
        .close-btn { background: none; border: none; cursor: pointer; font-size: 16px; color: #aaa; padding: 0; line-height: 1; }
        
        .segment { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #f0f0f0; }
        .segment:last-child { border-bottom: none; }
        .horizon-selector { display: flex; align-items: center; gap: 7px; margin-bottom: 8px; }
        .h-btn {
            width: 22px; height: 22px; border-radius: 50%; cursor: pointer; flex-shrink: 0;
            background: #f0f0f0; border: 1.5px solid #ddd; padding: 0; transition: all 0.1s;
        }
        .h-label { font-size: 11px; color: #999; margin-left: 3px; }
        
        .textarea-wrapper { position: relative; }
        textarea {
            width: 100%; resize: vertical; font-family: Arial, sans-serif; font-size: 12px; color: #333;
            background: #fafafa; border: 1px solid #e8e8e8; border-radius: 3px; padding: 7px 8px;
            box-sizing: border-box; outline: none; line-height: 1.5;
        }
        .char-count { position: absolute; bottom: 6px; right: 8px; font-size: 10px; color: #ccc; }
        
        .modal-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .add-segment-btn { font-size: 11px; color: #999; background: none; border: 1px solid #e8e8e8; border-radius: 3px; padding: 5px 10px; cursor: pointer; }
        .save-btn { background: #111; color: #fff; border: none; border-radius: 3px; padding: 8px 20px; font-size: 12px; font-weight: 500; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <button class="nav-btn" onclick="navigate(-1)">←</button>
        <span class="month-title" id="monthTitle"></span>
        <span class="year-title" id="yearTitle"></span>
        <button class="nav-btn" onclick="navigate(1)">→</button>
        <button class="nav-btn today-btn" id="todayBtn" onclick="goToday()" style="display: none;">today</button>
        <span class="logged-count" id="loggedCount">0/0 logged</span>
    </div>

    <div class="legend" id="legendContainer"></div>

    <div class="stats-bar" id="statsBar"></div>

    <div class="dow-grid" id="dowGrid"></div>

    <div class="calendar-grid" id="calendarGrid"></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeEditor(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle"></span>
            <button class="close-btn" onclick="closeEditor(event)">×</button>
        </div>
        <div id="segmentsContainer"></div>
        <div class="modal-footer">
            <button class="add-segment-btn" id="addSegmentBtn" onclick="addSegment()">+ add segment</button>
            <button class="save-btn" onclick="saveDay()">Save</button>
        </div>
    </div>
</div>

<script>
    // Constants & Configuration
    const HORIZONS = [
        { id: "survival", label: "Survival", short: "Now", color: "#888" },
        { id: "2wk", label: "2 wk", short: "2 wk", color: "#7dd3fc" },
        { id: "1yr", label: "1 yr", short: "1 yr", color: "#3b82f6" },
        { id: "5yr", label: "5 yr", short: "5 yr", color: "#d946ef" },
        { id: "10yr", label: "10+ yr", short: "10+", color: "#f59e0b" }
    ];
    const DOW = ["Mo", "Tu", "We", "Th", "Fr", "Sa", "Su"];
    const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const FULL_DOW = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

    // State Variables
    const today = new Date();
    let viewYear = today.getFullYear();
    let viewMonth = today.getMonth();
    let monthData = {};
    let editDay = null;
    let editSegments = [];

    // Helper Functions
    function storageKey(year, month) { return `intent-cal:${year}-${String(month + 1).padStart(2, "0")}`; }
    function getDaysInMonth(year, month) { return new Date(year, month + 1, 0).getDate(); }
    function getFirstDayOfWeek(year, month) { 
        let d = new Date(year, month, 1).getDay(); 
        return d === 0 ? 6 : d - 1; 
    }

    // Load / Save Data
    async function loadData() {
        try {
            const response = await fetch(`/api/calendar/${viewYear}/${viewMonth}`);
            monthData = response.ok ? await response.json() : {};
        } catch (e) { monthData = {}; }
        renderAll();
    }

    async function saveDay() {
        const filtered = editSegments.filter(s => s.text.trim() !== "");
        const dateStr = `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}-${String(editDay).padStart(2, '0')}`;
        
        try {
            const response = await fetch('/api/calendar/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ date: dateStr, segments: filtered })
            });

            if (response.ok) {
                if (filtered.length === 0) delete monthData[editDay];
                else monthData[editDay] = filtered;
                
                renderAll();
                closeEditor();
            } else {
                alert("Помилка збереження на сервері");
            }
        } catch (e) {
            console.error("Помилка мережі:", e);
        }
    }

    // Navigation
    function navigate(dir) {
        viewMonth += dir;
        if (viewMonth < 0) { viewMonth = 11; viewYear--; }
        if (viewMonth > 11) { viewMonth = 0; viewYear++; }
        loadData();
    }

    function goToday() {
        viewYear = today.getFullYear();
        viewMonth = today.getMonth();
        loadData();
    }

    // Rendering core
    function renderAll() {
        const isCurrentMonth = viewYear === today.getFullYear() && viewMonth === today.getMonth();
        const daysInMonth = getDaysInMonth(viewYear, viewMonth);
        const loggedCount = Object.keys(monthData).length;

        // Header
        document.getElementById('monthTitle').innerText = MONTHS[viewMonth];
        document.getElementById('yearTitle').innerText = viewYear;
        document.getElementById('todayBtn').style.display = isCurrentMonth ? 'none' : 'inline-block';
        document.getElementById('loggedCount').innerText = `${loggedCount}/${daysInMonth} logged`;

        // Legend (Static, but render once)
        const legendContainer = document.getElementById('legendContainer');
        if (!legendContainer.innerHTML) {
            legendContainer.innerHTML = HORIZONS.map(h => `
                <div class="legend-item">
                    <div class="dot" style="background: ${h.color};"></div>
                    <span>${h.label}</span>
                </div>
            `).join('');
            
            document.getElementById('dowGrid').innerHTML = DOW.map(d => `<div class="dow-item">${d}</div>`).join('');
        }

        // Stats
        let stats = HORIZONS.map(h => ({ ...h, count: 0 }));
        Object.values(monthData).forEach(segs => segs.forEach(s => {
            let found = stats.find(stat => stat.id === s.horizon);
            if (found) found.count++;
        }));
        
        let totalSegs = stats.reduce((sum, s) => sum + s.count, 0);
        const statsBar = document.getElementById('statsBar');
        statsBar.innerHTML = '';
        if (totalSegs > 0) {
            statsBar.style.display = 'flex';
            stats.forEach(s => {
                if (s.count > 0) {
                    let div = document.createElement('div');
                    div.className = 'stats-segment';
                    div.style.width = `${(s.count / totalSegs) * 100}%`;
                    div.style.background = s.color;
                    statsBar.appendChild(div);
                }
            });
        } else {
            statsBar.style.display = 'none';
        }

        // Calendar Grid
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const firstDow = getFirstDayOfWeek(viewYear, viewMonth);
        
        // Empty cells for offset
        for (let i = 0; i < firstDow; i++) {
            let emptyDiv = document.createElement('div');
            grid.appendChild(emptyDiv);
        }

        // Days
        for (let day = 1; day <= daysInMonth; day++) {
            const isToday = isCurrentMonth && day === today.getDate();
            const isFuture = isCurrentMonth && day > today.getDate();
            const segs = monthData[day] || [];
            
            let cell = document.createElement('div');
            cell.className = `day-cell ${isToday ? 'is-today' : ''} ${isFuture ? 'is-future' : ''}`;
            cell.onclick = () => openEditor(day);

            let dotsHtml = segs.map(s => {
                let h = HORIZONS.find(hz => hz.id === s.horizon);
                return h ? `<div class="dot" style="background: ${h.color};"></div>` : '';
            }).join('');

            let previewText = segs.map(s => s.text).filter(Boolean).join(" · ");
            let textHtml = previewText ? `<div class="day-preview">${previewText}</div>` : '';

            cell.innerHTML = `
                <div class="day-header">
                    <span class="day-number">${day}</span>
                    ${dotsHtml}
                </div>
                ${textHtml}
            `;
            grid.appendChild(cell);
        }
    }

    // Modal & Editing
    function openEditor(day) {
        editDay = day;
        const existingData = monthData[day];
        if (existingData && existingData.length > 0) {
            editSegments = JSON.parse(JSON.stringify(existingData)); // Deep copy
        } else {
            editSegments = [{ horizon: "1yr", text: "" }];
        }
        
        const dateObj = new Date(viewYear, viewMonth, editDay);
        document.getElementById('modalTitle').innerText = `${FULL_DOW[dateObj.getDay()]}, ${MONTHS[viewMonth]} ${editDay}`;
        
        document.getElementById('modalOverlay').style.display = 'flex';
        renderModalSegments();
    }

    function closeEditor(e) {
        if(e) e.stopPropagation();
        editDay = null;
        document.getElementById('modalOverlay').style.display = 'none';
    }

    function addSegment() {
        if (editSegments.length < 4) {
            editSegments.push({ horizon: "1yr", text: "" });
            renderModalSegments();
        }
    }

    function removeSegment(index) {
        editSegments.splice(index, 1);
        renderModalSegments();
    }

    function updateSegment(index, field, value) {
        editSegments[index][field] = value;
        
        if (field === 'horizon') {
            renderModalSegments();
        } 
        else if (field === 'text') {
            const charCountSpan = document.getElementById(`char-count-${index}`);
            if (charCountSpan) {
                charCountSpan.innerText = `${value.length}/140`;
                charCountSpan.style.color = value.length > 120 ? '#f59e0b' : '#ccc';
            }
        }
    }

    function renderModalSegments() {
        const container = document.getElementById('segmentsContainer');
        container.innerHTML = '';

        editSegments.forEach((seg, i) => {
            let segmentDiv = document.createElement('div');
            segmentDiv.className = 'segment';
            
            let horizonsHtml = HORIZONS.map(h => {
                const isActive = seg.horizon === h.id;
                const style = isActive 
                    ? `background: ${h.color}; border: 2px solid #fff; outline: 2px solid ${h.color}; outline-offset: 1px;` 
                    : `background: #f0f0f0; border: 1.5px solid #ddd; outline: none;`;
                return `<button class="h-btn" style="${style}" onclick="updateSegment(${i}, 'horizon', '${h.id}')" title="${h.label}"></button>`;
            }).join('');

            const currentHorizonName = HORIZONS.find(h => h.id === seg.horizon)?.label || '';
            const charCountColor = seg.text.length > 120 ? '#f59e0b' : '#ccc';
            const removeBtnHtml = editSegments.length > 1 ? `<button class="close-btn" style="margin-left: auto;" onclick="removeSegment(${i})">×</button>` : '';

            segmentDiv.innerHTML = `
                <div class="horizon-selector">
                    ${horizonsHtml}
                    <span class="h-label">${currentHorizonName}</span>
                    ${removeBtnHtml}
                </div>
                <div class="textarea-wrapper">
                    <textarea rows="3" placeholder="What was the focus of this segment? (140 chars)" 
                        oninput="updateSegment(${i}, 'text', this.value.slice(0, 140))">${seg.text}</textarea>
                    <span class="char-count" style="color: ${charCountColor}">${seg.text.length}/140</span>
                </div>
            `;
            container.appendChild(segmentDiv);
        });

        const addBtn = document.getElementById('addSegmentBtn');
        addBtn.style.visibility = editSegments.length < 4 ? 'visible' : 'hidden';
    }

    // Initialize
    loadData();

</script>
</body>
</html>
